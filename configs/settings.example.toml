# Example configuration for the scaffold backtest and ingest commands.
# Cost values below are illustrative placeholders for development only.

project_name = "tw_quant_v1"
market = "TW cash equities"
universe = "top_liquid_tw_equities"
benchmark = "TAIEX"
start_date = "2021-01-01"
end_date = "2024-12-31"

[paths]
project_root = ".."
raw = "data/raw"
processed = "data/processed"
reports = "data/processed/reports"

[costs]
commission_bps = 14.25
tax_bps = 30.0
slippage_bps = 5.0

[ingest]
provider = "finmind"
symbols = ["2330", "0050"]
refresh = false
storage_format = "csv"
token_env_var = "FINMIND_API_TOKEN"
raw_cache_subdir = "finmind"
normalized_subdir = "market_data/daily"

[signals]
enabled_symbols = ["2330", "0050"]
benchmark = "TAIEX"
ma_fast_window = 20
ma_slow_window = 60
momentum_window = 20
volatility_window = 20
volatility_cap = 0.35
align_by_date = true
input_subdir = "market_data/daily"
output_subdir = "signals/daily"
output_file = "signal_panel.csv"
